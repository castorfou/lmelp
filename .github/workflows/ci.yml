name: 🔄 Continuous Integration

on:
  push:
  pull_request:
    branches: [ main ]

env:
  PYTHONUNBUFFERED: "1"
  FORCE_COLOR: "1"

jobs:
  tests:
    name: Test on Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
    - name: 📥 Checkout repository
      uses: actions/checkout@v4

    - name: 🔧 Install system dependencies
      run: sudo apt-get update && sudo apt-get install -y libdbus-1-dev pkg-config libglib2.0-dev

    - name: 🐍 Install uv
      uses: astral-sh/setup-uv@v4
      with:
        enable-cache: true
        cache-dependency-glob: "pyproject.toml"

    - name: 🐍 Set up Python ${{ matrix.python-version }}
      run: uv python install ${{ matrix.python-version }}

    - name: 📦 Install dependencies
      run: uv sync --extra dev

    - name: 🧪 Run tests
      run: uv run pytest tests/ -v --cov=nbs --cov-report=term-missing --cov-report=xml --cov-fail-under=70

    - name: 🧪 Test infrastructure CI/CD (.env.test robustness)
      run: |
        cd /tmp
        uv run --project $GITHUB_WORKSPACE pytest $GITHUB_WORKSPACE/tests/unit/test_fixtures.py::TestFixturesPackage::test_load_env_test_robustness_for_cicd -v
      env:
        PYTHONPATH: ${{ github.workspace }}

    - name: 📊 Upload coverage to Codecov
      if: matrix.python-version == '3.11'
      uses: codecov/codecov-action@v4
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
        files: ./coverage.xml
        fail_ci_if_error: false

  lint:
    name: 🔍 Lint & Format
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
    - name: 📥 Checkout repository
      uses: actions/checkout@v4

    - name: 🐍 Install uv
      uses: astral-sh/setup-uv@v4

    - name: 🐍 Set up Python
      run: uv python install 3.11

    - name: 📦 Install dependencies
      run: uv sync --extra dev

    - name: 🔍 Lint with ruff
      run: uv run ruff check . --output-format=github
      continue-on-error: true

    - name: 🎨 Check formatting with ruff
      run: uv run ruff format --check .
      continue-on-error: true

  pre-commit:
    name: 🪝 Pre-commit hooks
    runs-on: ubuntu-latest
    steps:
    - name: 📥 Checkout repository
      uses: actions/checkout@v4

    - name: 🐍 Install uv
      uses: astral-sh/setup-uv@v4

    - name: 🐍 Set up Python
      run: uv python install 3.11

    - name: 📦 Install dependencies
      run: uv sync --extra dev

    - name: 🪝 Run pre-commit hooks
      run: uv run pre-commit run --all-files --show-diff-on-failure || echo "⚠️ Pre-commit hooks found issues"

  build:
    name: 🏗️ Build package
    runs-on: ubuntu-latest
    needs: [tests]
    steps:
    - name: 📥 Checkout repository
      uses: actions/checkout@v4

    - name: 🐍 Install uv
      uses: astral-sh/setup-uv@v4

    - name: 🐍 Set up Python
      run: uv python install 3.11

    - name: 📦 Install build dependencies
      run: uv sync

    - name: 🏗️ Build package
      run: uv build

    - name: 📤 Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: dist
        path: dist/

    - name: ✅ Verify package
      run: |
        echo "📦 Built packages:"
        ls -la dist/
